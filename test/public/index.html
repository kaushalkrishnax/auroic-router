<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auroic Router Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <style>
    :root {
      --bg: #07080a;
      --panel: #0e1014;
      --panel2: #13151a;
      --border: #1e2028;
      --border2: #2a2d38;
      --accent: #4f8eff;
      --accent2: #7c5cfc;
      --text: #e8eaf0;
      --muted: #6b7080;
      --muted2: #9098a8;
      --green: #2dd87a;
      --red: #f04f4f;
      --amber: #f5a623;
      --cyan: #22d4e8;
      --r: 10px;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 15px;
    }

    /* ── Header ── */
    header {
      height: 64px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      opacity: 0.4;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 17px;
      font-weight: 800;
      color: white;
      letter-spacing: -1px;
      box-shadow: 0 0 20px rgba(79, 142, 255, 0.3);
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text);
    }

    .brand-sub {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .header-stats {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .stat-label {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 16px;
      font-family: var(--mono);
      font-weight: 600;
      color: var(--text);
    }

    .stat-value.live {
      color: var(--green);
    }

    .model-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 8px 14px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted2);
    }

    .model-dot {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .section-label {
      font-size: 11px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      font-weight: 500;
    }

    .msg-list {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .msg-num {
      width: 28px;
      height: 28px;
      background: var(--panel2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--muted2);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-input {
      flex: 1;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px 14px;
      resize: none;
      min-height: 52px;
      outline: none;
      line-height: 1.6;
      transition: border-color 0.2s;
    }

    .msg-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79, 142, 255, 0.08);
    }

    .msg-input::placeholder {
      color: var(--muted);
    }

    .sidebar-footer {
      padding: 20px 28px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 13px 20px;
      border-radius: var(--r);
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.18s;
      letter-spacing: 0.3px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      flex: 1;
      box-shadow: 0 4px 16px rgba(79, 142, 255, 0.25);
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-ghost {
      background: transparent;
      border-color: var(--border2);
      color: var(--muted2);
    }

    .btn-ghost:hover {
      border-color: var(--muted);
      color: var(--text);
    }

    /* ── Main ── */
    .main-area {
      display: grid;
      grid-template-rows: 1fr 320px;
      overflow: hidden;
    }

    /* ── Result Stage ── */
    .result-stage {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px;
      background:
        radial-gradient(ellipse 60% 50% at 50% 50%, rgba(79, 142, 255, 0.04) 0%, transparent 70%),
        var(--bg);
      overflow-y: auto;
      position: relative;
    }

    .result-stage::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.25;
      pointer-events: none;
    }

    .decision-card {
      background: rgba(14, 16, 20, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border2);
      border-radius: 16px;
      width: 100%;
      max-width: 680px;
      padding: 32px;
      box-shadow:
        0 32px 64px rgba(0, 0, 0, 0.5),
        0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      position: relative;
      z-index: 1;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-size: 13px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--panel2);
      border: 1px solid var(--border2);
      color: var(--muted2);
    }

    .status-pill.success {
      color: var(--green);
      border-color: rgba(45, 216, 122, 0.25);
      background: rgba(45, 216, 122, 0.06);
    }

    .status-pill.error {
      color: var(--red);
      border-color: rgba(240, 79, 79, 0.25);
      background: rgba(240, 79, 79, 0.06);
    }

    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field-full {
      grid-column: 1 / -1;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-label {
      font-size: 10px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      font-weight: 600;
    }

    .field-val {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: var(--mono);
      font-size: 15px;
      color: var(--muted2);
      min-height: 52px;
      display: flex;
      align-items: center;
      transition: all 0.2s;
      word-break: break-word;
    }

    .field-val.type-val {
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
      border-color: rgba(79, 142, 255, 0.2);
      background: rgba(79, 142, 255, 0.05);
      min-height: 64px;
      justify-content: center;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    .field-val.has-value {
      color: var(--text);
    }

    .field-val.null-val {
      color: var(--muted);
      font-style: italic;
    }

    .effort-low {
      color: var(--green) !important;
      border-color: rgba(45, 216, 122, 0.2) !important;
      background: rgba(45, 216, 122, 0.04) !important;
    }

    .effort-medium {
      color: var(--amber) !important;
      border-color: rgba(245, 166, 35, 0.2) !important;
      background: rgba(245, 166, 35, 0.04) !important;
    }

    .effort-high {
      color: var(--red) !important;
      border-color: rgba(240, 79, 79, 0.2) !important;
      background: rgba(240, 79, 79, 0.04) !important;
    }

    /* ── Console ── */
    .console-area {
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--panel);
      overflow: hidden;
    }

    .console-bar {
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: #0b0c10;
      flex-shrink: 0;
    }

    .ctab {
      padding: 14px 24px;
      font-size: 13px;
      font-family: var(--mono);
      color: var(--muted);
      cursor: pointer;
      background: transparent;
      border: none;
      border-top: 2px solid transparent;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }

    .ctab:hover {
      color: var(--muted2);
    }

    .ctab.active {
      color: var(--text);
      border-top-color: var(--accent);
      background: var(--panel);
    }

    .ctab-right {
      margin-left: auto;
      border-left: 1px solid var(--border);
    }

    .console-body {
      flex: 1;
      overflow-y: auto;
      font-family: var(--mono);
      font-size: 13px;
    }

    .log-row {
      padding: 14px 24px;
      border-bottom: 1px solid rgba(30, 32, 40, 0.8);
      line-height: 1.6;
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 14px;
      align-items: flex-start;
    }

    .log-idx {
      color: var(--muted);
      font-size: 11px;
      padding-top: 2px;
      text-align: right;
    }

    .log-content {
      color: var(--muted2);
    }

    .log-content .log-input {
      color: var(--text);
      margin-bottom: 6px;
    }

    .log-content .log-out {
      color: var(--accent);
    }

    .log-content .log-meta {
      color: var(--muted);
      font-size: 11px;
      margin-top: 4px;
    }

    .raw-pane {
      padding: 24px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--cyan);
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .hidden {
      display: none !important;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3a3d4a;
    }

    .mode-btn {
      padding: 5px 14px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }

    .mode-btn.active {
      background: var(--accent);
      color: white;
    }

    .mode-btn:not(.active):hover {
      color: var(--text);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      opacity: 0.6;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="brand">
      <div class="brand-mark">A</div>
      <div class="brand-text">
        <span class="brand-name">Auroic Router Lab</span>
        <span class="brand-sub">Decision Tester</span>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat">
        <span class="stat-label">Latency</span>
        <span class="stat-value" id="statLat">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Samples</span>
        <span class="stat-value" id="statCount">0</span>
      </div>
      <div class="model-badge">
        <div class="model-dot"></div>
        auroic-router-0.6b
      </div>
    </div>
  </header>

  <div class="layout">

    <aside class="sidebar">
      <div class="sidebar-header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span class="section-label" id="modeLabel">Raw Paste</span>
          <div
            style="display:flex; gap:0; background:var(--panel2); border:1px solid var(--border2); border-radius:6px; overflow:hidden;">
            <button class="mode-btn active" id="btnRawMode" onclick="setMode('raw')">Raw</button>
            <button class="mode-btn" id="btnSplitMode" onclick="setMode('split')">Split</button>
          </div>
        </div>
      </div>

      <!-- RAW MODE -->
      <div id="rawMode"
        style="flex:1; display:flex; flex-direction:column; padding:16px 28px; gap:10px; overflow:hidden;">
        <div style="font-size:11px; font-family:var(--mono); color:var(--muted); line-height:1.6;">
          One message per line. Up to 5 lines used (M1→M5).
        </div>
        <textarea id="rawPaste"
          style="flex:1; width:100%; background:var(--panel2); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-family:var(--mono); font-size:13px; padding:14px; resize:none; outline:none; line-height:1.7; transition:border-color 0.2s;"
          placeholder="lol&#10;haha&#10;😂&#10;💀&#10;hehehehe" onfocus="this.style.borderColor='var(--accent)'"
          onblur="this.style.borderColor='var(--border)'"></textarea>
        <div id="rawPreview" style="display:flex; flex-direction:column; gap:4px;"></div>
      </div>

      <!-- SPLIT MODE -->
      <div id="splitMode" class="msg-list hidden">
        <div class="msg-row">
          <div class="msg-num">M1</div>
          <textarea class="msg-input" id="m1" placeholder="oldest message..." rows="2"></textarea>
        </div>
        <div class="msg-row">
          <div class="msg-num">M2</div>
          <textarea class="msg-input" id="m2" placeholder="" rows="2"></textarea>
        </div>
        <div class="msg-row">
          <div class="msg-num">M3</div>
          <textarea class="msg-input" id="m3" placeholder="" rows="2"></textarea>
        </div>
        <div class="msg-row">
          <div class="msg-num">M4</div>
          <textarea class="msg-input" id="m4" placeholder="" rows="2"></textarea>
        </div>
        <div class="msg-row">
          <div class="msg-num">M5</div>
          <textarea class="msg-input" id="m5" placeholder="newest message..." rows="2"></textarea>
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="btn-row">
          <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
          <button class="btn btn-primary" id="routeBtn" onclick="runRoute()">Run Route →</button>
        </div>
      </div>
    </aside>

    <main class="main-area">

      <div class="result-stage">
        <div class="decision-card">
          <div class="card-top">
            <span class="card-title">Router Decision</span>
            <span class="status-pill" id="statusPill">Idle</span>
          </div>

          <div class="fields-grid">
            <div class="field field-full">
              <span class="field-label">Type</span>
              <div class="field-val type-val" id="outType">—</div>
            </div>

            <div class="field">
              <span class="field-label">Target</span>
              <div class="field-val null-val" id="outTarget">null</div>
            </div>

            <div class="field">
              <span class="field-label">Effort</span>
              <div class="field-val null-val" id="outEffort">null</div>
            </div>

            <div class="field field-full">
              <span class="field-label">Title</span>
              <div class="field-val null-val" id="outTitle">null</div>
            </div>
          </div>
        </div>
      </div>

      <div class="console-area">
        <div class="console-bar">
          <button class="ctab active" id="tabBtnLogs" onclick="switchTab('logs', this)">Session Log</button>
          <button class="ctab" id="tabBtnRaw" onclick="switchTab('raw', this)">Raw Output</button>
          <button class="ctab ctab-right" onclick="copyLogs()">Copy Log</button>
        </div>

        <div class="console-body" id="paneLogs">
          <div class="empty-state">session ready — waiting for input</div>
        </div>

        <div class="console-body hidden" id="paneRaw">
          <div class="raw-pane" id="rawOutput">waiting for model response...</div>
        </div>
      </div>

    </main>
  </div>

  <script>
    let sampleCount = 0;
    let currentMode = 'raw';

    function setMode(mode) {
      currentMode = mode;
      document.getElementById('btnRawMode').classList.toggle('active', mode === 'raw');
      document.getElementById('btnSplitMode').classList.toggle('active', mode === 'split');
      document.getElementById('rawMode').classList.toggle('hidden', mode !== 'raw');
      document.getElementById('splitMode').classList.toggle('hidden', mode !== 'split');
      document.getElementById('modeLabel').textContent = mode === 'raw' ? 'Raw Paste' : 'Split Fields';
    }

    function getMessages() {
      if (currentMode === 'raw') {
        return document.getElementById('rawPaste').value
          .split('\n')
          .map(l => l.trim())
          .filter(Boolean)
          .slice(0, 5);
      } else {
        return ['m1', 'm2', 'm3', 'm4', 'm5']
          .map(id => document.getElementById(id).value.trim())
          .filter(Boolean);
      }
    }

    // Live preview in raw mode
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('rawPaste').addEventListener('input', updatePreview);
    });

    function updatePreview() {
      const lines = document.getElementById('rawPaste').value
        .split('\n').map(l => l.trim()).filter(Boolean).slice(0, 5);
      const preview = document.getElementById('rawPreview');
      preview.innerHTML = lines.map((l, i) =>
        `<div style="display:flex;gap:8px;align-items:center;">
          <span style="font-family:var(--mono);font-size:10px;color:var(--accent);width:20px;flex-shrink:0;">M${i + 1}</span>
          <span style="font-family:var(--mono);font-size:11px;color:var(--muted2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${l}</span>
        </div>`
      ).join('');
    }

    function clearAll() {
      document.getElementById('rawPaste').value = '';
      document.getElementById('rawPreview').innerHTML = '';
      ['m1', 'm2', 'm3', 'm4', 'm5'].forEach(id => document.getElementById(id).value = '');
    }

    function switchTab(name, btn) {
      document.querySelectorAll('.ctab:not(.ctab-right)').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('paneLogs').classList.toggle('hidden', name !== 'logs');
      document.getElementById('paneRaw').classList.toggle('hidden', name !== 'raw');
    }

    function setField(id, value, extraClass) {
      const el = document.getElementById(id);
      el.textContent = value || 'null';
      el.className = 'field-val';
      if (!value || value === 'null') {
        el.classList.add('null-val');
      } else {
        el.classList.add('has-value');
        if (extraClass) el.classList.add(extraClass);
      }
    }

    async function runRoute() {
      const messages = getMessages();

      if (messages.length === 0) {
        alert('Enter at least one message');
        return;
      }

      const btn = document.getElementById('routeBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Routing...';

      const pill = document.getElementById('statusPill');
      pill.className = 'status-pill';
      pill.textContent = 'Routing...';

      const t0 = performance.now();

      try {
        const res = await fetch('/route', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages }),
        });

        const data = await res.json();
        const ms = Math.round(performance.now() - t0);

        if (data.fallback) throw new Error(data.error || 'Router fallback triggered');

        const d = data.decision;

        const typeEl = document.getElementById('outType');
        typeEl.textContent = d.type || '—';
        typeEl.className = 'field-val type-val has-value';

        setField('outTarget', d.target);
        setField('outEffort', d.effort, d.effort ? `effort-${d.effort}` : null);
        setField('outTitle', d.title);

        pill.className = 'status-pill success';
        pill.textContent = `${ms}ms`;
        document.getElementById('statLat').textContent = `${ms}ms`;

        document.getElementById('rawOutput').textContent = data.raw || 'No raw output';

        sampleCount++;
        document.getElementById('statCount').textContent = sampleCount;

        const pane = document.getElementById('paneLogs');
        if (pane.querySelector('.empty-state')) pane.innerHTML = '';

        const row = document.createElement('div');
        row.className = 'log-row';
        row.innerHTML = `
          <span class="log-idx">${sampleCount}</span>
          <div class="log-content">
            <div class="log-input">${messages.map((m, i) => `M${i + 1}: ${m}`).join(' · ')}</div>
            <div class="log-out">${data.raw || ''}</div>
            <div class="log-meta">${ms}ms · ${new Date().toLocaleTimeString()}</div>
          </div>
        `;
        pane.prepend(row);

      } catch (err) {
        console.error(err);
        pill.className = 'status-pill error';
        pill.textContent = 'Error';
        document.getElementById('rawOutput').textContent = 'Error: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run Route →';
      }
    }

    function copyLogs() {
      navigator.clipboard.writeText(document.getElementById('paneLogs').innerText);
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('rawPaste').addEventListener('keydown', e => {
        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) runRoute();
      });
    });
  </script>

</body>
